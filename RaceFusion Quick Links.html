<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RaceFusion Quick Links</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #e03030;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .subtitle {
    color: #666;
    font-size: 13px;
    margin-bottom: 40px;
    letter-spacing: 1px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px 24px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: border-color 0.2s, background 0.2s;
  }
  .card:hover {
    background: #222;
    border-color: #e03030;
  }
  .icon {
    font-size: 32px;
    width: 44px;
    text-align: center;
    flex-shrink: 0;
  }
  .info { flex: 1; }
  .site-name {
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .site-desc {
    color: #888;
    font-size: 13px;
    line-height: 1.4;
  }
  .arrow {
    color: #444;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card:hover .arrow { color: #e03030; }
  .footer {
    margin-top: 36px;
    color: #444;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="logo">🏁 RaceFusion</div>
<div class="subtitle">Quick Links</div>

<div class="cards">

  <a class="card" href="https://share.streamlit.io" target="_blank">
    <div class="icon">🚀</div>
    <div class="info">
      <div class="site-name">Streamlit</div>
      <div class="site-desc">Your live app — deploy, manage, and monitor RaceFusion</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="card" href="https://github.com" target="_blank">
    <div class="icon">🐙</div>
    <div class="info">
      <div class="site-name">GitHub</div>
      <div class="site-desc">Source code repository — where app.py and all files live</div>
    </div>
    <div class="arrow">›</div>
  </a>

  <a class="card" href="https://supabase.com/dashboard" target="_blank">
    <div class="icon">🗄️</div>
    <div class="info">
      <div class="site-name">Supabase</div>
      <div class="site-desc">Database & file storage — runs, user accounts, timeslip images</div>
    </div>
    <div class="arrow">›</div>
  </a>

</div>

<div class="footer">Double-click this file anytime to open your links</div>

</body>
</html>
